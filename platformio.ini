; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-fh4r2]
platform = espressif32
framework = arduino
board = dfrobot_firebeetle2_esp32s3

; Memory Configuration for FH4R2 (4MB Flash QIO / 2MB PSRAM QSPI)
board_upload.flash_size = 4MB
board_build.flash_mode = qio
board_build.psram_type = qio          
board_build.arduino.memory_type = qio_qspi  ; REQUIRED: Maps the Arduino RAM allocation tables

; Partition Layout
board_build.partitions = huge_app.csv       ; Allocates max 3.12MB for your program sketch

; Compiler Flags
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1             ; Forces Serial.print out to native USB
    -DBOARD_HAS_PSRAM                       ; Allocates memory allocation tables for external RAM

monitor_speed = 115200

lib_deps =
    adafruit/Adafruit SSD1306 @ 2.5.13
    adafruit/Adafruit GFX Library @ 1.11.11
    mathieucarbou/ESPAsyncWebServer@^3.2.4
    mathieucarbou/AsyncTCP@^3.2.5
    bblanchon/ArduinoJson@^7.1.0

; --- OTA Upload Configuration ---
;upload_protocol = espota
;upload_port = 192.168.1.46
